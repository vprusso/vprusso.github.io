<!-- Highlight.js for Lean syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- Lean language support from leanprover-community -->
<script src="https://cdn.jsdelivr.net/npm/highlightjs-lean@1.0.0/dist/lean.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Highlight all code blocks with Lean
    document.querySelectorAll('pre code.language-lean').forEach((block) => {
      hljs.highlightElement(block);
    });

    // Ensure MathJax processes post summaries on list pages
    if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
      MathJax.typesetPromise();
    }
  });
</script>
