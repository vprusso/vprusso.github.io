<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#e0e0e0">LRE Workflow</text>

  <!-- Step 1: Input Circuit -->
  <rect x="300" y="55" width="200" height="50" fill="#2d4a2d" stroke="#6bcb77" rx="6" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#6bcb77">Input Circuit</text>
  <text x="400" y="95" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">(l layers)</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="105" x2="400" y2="135" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Multivariate Scaling -->
  <rect x="220" y="140" width="360" height="70" fill="#2d2d4a" stroke="#74b9ff" rx="6" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#74b9ff">Multivariate Layer Scaling</text>
  <text x="400" y="183" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Generate M noise-scaled circuits with</text>
  <text x="400" y="198" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">scale factor vectors Λ = (λ₁, λ₂, ..., λₘ)</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="210" x2="400" y2="240" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Circuit Collection -->
  <rect x="180" y="245" width="440" height="80" fill="#4a3d2d" stroke="#ffd93d" rx="6" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ffd93d">Noise-Scaled Circuit Collection</text>

  <!-- Mini circuits -->
  <rect x="210" y="278" width="55" height="35" fill="#ffaaaa" stroke="#cc6666" rx="3"/>
  <text x="237" y="298" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">λ=(1,1,3)</text>
  <rect x="280" y="278" width="55" height="35" fill="#ff8888" stroke="#cc4444" rx="3"/>
  <text x="307" y="298" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">λ=(1,3,1)</text>
  <rect x="350" y="278" width="55" height="35" fill="#ff6666" stroke="#cc2222" rx="3"/>
  <text x="377" y="298" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">λ=(3,1,1)</text>
  <rect x="420" y="278" width="55" height="35" fill="#ff4444" stroke="#cc0000" rx="3"/>
  <text x="447" y="298" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">λ=(3,3,1)</text>
  <rect x="490" y="278" width="55" height="35" fill="#cc2222" stroke="#990000" rx="3"/>
  <text x="517" y="298" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">λ=(3,3,3)</text>
  <text x="570" y="298" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">...</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="325" x2="400" y2="355" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Execution -->
  <rect x="250" y="360" width="300" height="50" fill="#4a2d2d" stroke="#ff6b6b" rx="6" stroke-width="2"/>
  <text x="400" y="383" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ff6b6b">Execute on Backend</text>
  <text x="400" y="400" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">Collect ⟨O(λᵢ)⟩ for each circuit</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="410" x2="400" y2="440" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Extrapolation -->
  <rect x="220" y="445" width="360" height="45" fill="#2d4a2d" stroke="#6bcb77" rx="6" stroke-width="2"/>
  <text x="400" y="468" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#6bcb77">Multivariate Richardson Extrapolation</text>
  <text x="400" y="483" text-anchor="middle" font-family="monospace" font-size="10" fill="#aaa">O_LRE = Σᵢ ⟨O(λᵢ)⟩ · cᵢ  →  Zero-noise estimate</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
</svg>
