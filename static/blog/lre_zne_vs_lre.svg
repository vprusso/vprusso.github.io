<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <!-- Background -->
  <rect width="900" height="400" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#e0e0e0">Standard ZNE vs. Layerwise Richardson Extrapolation (LRE)</text>

  <!-- ZNE Side -->
  <rect x="30" y="55" width="400" height="320" fill="#252542" stroke="#444" rx="6"/>
  <text x="230" y="80" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ffd93d">Standard ZNE</text>
  <text x="230" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#aaa">Single noise parameter λ</text>

  <!-- ZNE Circuit layers - all same color to show uniform scaling -->
  <text x="60" y="135" font-family="monospace" font-size="11" fill="#ccc">Original circuit:</text>
  <!-- Layer boxes -->
  <rect x="60" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="100" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 1</text>
  <rect x="155" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="195" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 2</text>
  <rect x="250" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="290" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 3</text>
  <rect x="345" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="385" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 4</text>

  <!-- Arrow -->
  <text x="230" y="210" text-anchor="middle" font-family="monospace" font-size="11" fill="#ccc">Scale ALL layers by λ=3:</text>

  <!-- Folded layers - all same intensity -->
  <rect x="60" y="220" width="80" height="40" fill="#ff6b6b" stroke="#cc3333" rx="4"/>
  <text x="100" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 1</text>
  <rect x="155" y="220" width="80" height="40" fill="#ff6b6b" stroke="#cc3333" rx="4"/>
  <text x="195" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 2</text>
  <rect x="250" y="220" width="80" height="40" fill="#ff6b6b" stroke="#cc3333" rx="4"/>
  <text x="290" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 3</text>
  <rect x="345" y="220" width="80" height="40" fill="#ff6b6b" stroke="#cc3333" rx="4"/>
  <text x="385" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 4</text>

  <!-- ZNE explanation -->
  <text x="60" y="290" font-family="monospace" font-size="10" fill="#aaa">→ Univariate extrapolation</text>
  <text x="60" y="305" font-family="monospace" font-size="10" fill="#aaa">→ Fit: f(λ) = a₀ + a₁λ + a₂λ² + ...</text>
  <text x="60" y="320" font-family="monospace" font-size="10" fill="#aaa">→ All layers treated identically</text>
  <text x="60" y="335" font-family="monospace" font-size="10" fill="#aaa">→ Single scale factor per circuit</text>

  <!-- LRE Side -->
  <rect x="470" y="55" width="400" height="320" fill="#252542" stroke="#444" rx="6"/>
  <text x="670" y="80" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#6bcb77">LRE</text>
  <text x="670" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#aaa">Per-layer noise parameters λ₁, λ₂, ...</text>

  <!-- LRE Circuit layers -->
  <text x="500" y="135" font-family="monospace" font-size="11" fill="#ccc">Original circuit:</text>
  <rect x="500" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="540" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 1</text>
  <rect x="595" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="635" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 2</text>
  <rect x="690" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="730" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 3</text>
  <rect x="785" y="145" width="80" height="40" fill="#4a90d9" stroke="#6bcb77" rx="4"/>
  <text x="825" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">Layer 4</text>

  <!-- Arrow -->
  <text x="670" y="210" text-anchor="middle" font-family="monospace" font-size="11" fill="#ccc">Scale layers INDEPENDENTLY:</text>

  <!-- Folded layers - different intensities -->
  <rect x="500" y="220" width="80" height="40" fill="#ffaaaa" stroke="#cc6666" rx="4"/>
  <text x="540" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">Layer 1</text>
  <text x="540" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">λ₁=1</text>
  <rect x="595" y="220" width="80" height="40" fill="#ff4444" stroke="#cc0000" rx="4"/>
  <text x="635" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">Layer 2</text>
  <text x="635" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">λ₂=5</text>
  <rect x="690" y="220" width="80" height="40" fill="#ff7777" stroke="#cc3333" rx="4"/>
  <text x="730" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">Layer 3</text>
  <text x="730" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">λ₃=3</text>
  <rect x="785" y="220" width="80" height="40" fill="#cc0000" stroke="#990000" rx="4"/>
  <text x="825" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">Layer 4</text>
  <text x="825" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">λ₄=7</text>

  <!-- LRE explanation -->
  <text x="500" y="290" font-family="monospace" font-size="10" fill="#aaa">→ Multivariate extrapolation</text>
  <text x="500" y="305" font-family="monospace" font-size="10" fill="#aaa">→ Fit: f(λ₁,λ₂,...) = Σ aᵢλ₁^α₁λ₂^α₂...</text>
  <text x="500" y="320" font-family="monospace" font-size="10" fill="#aaa">→ Each layer scaled independently</text>
  <text x="500" y="335" font-family="monospace" font-size="10" fill="#aaa">→ Vector of scale factors per circuit</text>

  <!-- Divider -->
  <line x1="450" y1="65" x2="450" y2="365" stroke="#555" stroke-width="2" stroke-dasharray="5,5"/>
</svg>
